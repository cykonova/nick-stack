services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.5.6
    container_name: immich-server
    depends_on:
      - immich-redis
      - immich-postgres
    environment:
      DB_HOSTNAME: immich-postgres
      DB_PORT: 5432
      DB_DATABASE_NAME: ${IMMICH_DB_NAME}
      DB_USERNAME: ${IMMICH_DB_USER}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      REDIS_HOSTNAME: immich-redis
      REDIS_PORT: 6379
      TZ: ${TZ}
    ports:
      - "${IMMICH_PORT}:2283"
    volumes:
      - ${IMMICH_UPLOAD_DIR}:/usr/src/app/upload
    networks:
      - edge
      - backend
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6-armnn
    container_name: immich-ml
    runtime: nvidia
    environment:
      TZ: ${TZ}
    volumes:
      - ${IMMICH_MODEL_CACHE_DIR}:/cache
    networks:
      - backend
    restart: unless-stopped

  immich-redis:
    image: redis:8-alpine
    container_name: immich-redis
    networks:
      - backend
    restart: unless-stopped

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.5.3-pgvector0.8.1
    container_name: immich-postgres
    environment:
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_USER: ${IMMICH_DB_USER}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${IMMICH_POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  syncthing:
    image: syncthing/syncthing:2.0.13
    container_name: syncthing
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    ports:
      - "${SYNCTHING_UI_PORT}:8384"
      - "${SYNCTHING_SYNC_TCP_PORT}:22000/tcp"
      - "${SYNCTHING_SYNC_UDP_PORT}:22000/udp"
      - "${SYNCTHING_DISCOVERY_UDP_PORT}:21027/udp"
    volumes:
      - ${SYNCTHING_CONFIG_DIR}:/var/syncthing/config
      - ${SYNCTHING_DATA_DIR}:/var/syncthing/data
    networks:
      - edge
    restart: unless-stopped

  forgejo:
    image: data.forgejo.org/forgejo/forgejo:14.0.2
    container_name: forgejo
    depends_on:
      - forgejo-postgres
    environment:
      USER_UID: ${PUID}
      USER_GID: ${PGID}
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-postgres:5432
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME}
      FORGEJO__database__USER: ${FORGEJO_DB_USER}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD}
      FORGEJO__server__SSH_PORT: 22
      FORGEJO__server__SSH_LISTEN_PORT: 22
      TZ: ${TZ}
    ports:
      - "${FORGEJO_HTTP_PORT}:3000"
      - "${FORGEJO_SSH_PORT}:22"
    volumes:
      - ${FORGEJO_DATA_DIR}:/data
    networks:
      - edge
      - backend
    restart: unless-stopped

  forgejo-postgres:
    image: postgres:18-alpine
    container_name: forgejo-postgres
    environment:
      POSTGRES_DB: ${FORGEJO_DB_NAME}
      POSTGRES_USER: ${FORGEJO_DB_USER}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${FORGEJO_POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  headscale:
    image: headscale/headscale:v0.28.0
    container_name: headscale
    profiles:
      - local-headscale
    command: serve
    environment:
      TZ: ${TZ}
    ports:
      - "${HEADSCALE_PORT}:8080"
    volumes:
      - ${HEADSCALE_DATA_DIR}:/var/lib/headscale
      - ${HEADSCALE_CONFIG_FILE}:/etc/headscale/config.yaml:ro
      - ${HEADSCALE_ACL_FILE}:/etc/headscale/acl.hujson:ro
    networks:
      - edge
    restart: unless-stopped

  navidrome:
    image: deluan/navidrome:0.59.0
    container_name: navidrome
    environment:
      ND_SCANSCHEDULE: ${ND_SCANSCHEDULE}
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      TZ: ${TZ}
    ports:
      - "${NAVIDROME_PORT}:4533"
    volumes:
      - ${NAVIDROME_DATA_DIR}:/data
      - ${NAVIDROME_MUSIC_DIR}:/music:ro
    networks:
      - edge
    restart: unless-stopped

  tailscale-client:
    image: tailscale/tailscale:v1.94.1
    container_name: tailscale-client
    profiles:
      - overlay
    hostname: ${TS_HOSTNAME}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --login-server=${TS_LOGIN_SERVER} --accept-routes=${TS_ACCEPT_ROUTES} --accept-dns=${TS_ACCEPT_DNS} --advertise-tags=${TS_ADVERTISE_TAGS} --advertise-routes=${EDGE_SUBNET}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ${TS_STATE_DIR}:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - edge
    restart: unless-stopped

  edge-gateway:
    image: nginx:1.28-alpine
    container_name: edge-gateway
    profiles:
      - hardened-overlay
    depends_on:
      - immich-server
      - syncthing
      - forgejo
      - navidrome
    volumes:
      - ${EDGE_GATEWAY_CONFIG_FILE}:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
      - overlay-hardened
    restart: unless-stopped

  tailscale-hardened:
    image: tailscale/tailscale:v1.94.1
    container_name: tailscale-hardened
    profiles:
      - hardened-overlay
    hostname: ${TS_HARDENED_HOSTNAME}
    depends_on:
      - edge-gateway
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --login-server=${TS_LOGIN_SERVER} --accept-routes=${TS_ACCEPT_ROUTES} --accept-dns=${TS_ACCEPT_DNS} --advertise-tags=${TS_ADVERTISE_TAGS} --advertise-routes=${HARDENED_OVERLAY_SUBNET}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ${TS_HARDENED_STATE_DIR}:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - overlay-hardened
    restart: unless-stopped

networks:
  edge:
    name: nick-edge
    ipam:
      config:
        - subnet: ${EDGE_SUBNET}
  backend:
    name: nick-backend
    internal: true
    ipam:
      config:
        - subnet: ${BACKEND_SUBNET}
  overlay-hardened:
    name: nick-overlay-hardened
    internal: true
    ipam:
      config:
        - subnet: ${HARDENED_OVERLAY_SUBNET}
